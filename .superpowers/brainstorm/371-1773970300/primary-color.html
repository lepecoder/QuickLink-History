<h2>Primary Color</h2>
<p class="subtitle">Material Design 主题色选择</p>

<div class="options">
  <div class="option" data-choice="blue" onclick="toggleSelect(this)">
    <div class="letter" style="background: #1976d2;">A</div>
    <div class="content">
      <h3>Blue (Default)</h3>
      <p>经典蓝色，与 Chrome 浏览器风格一致，专业稳重</p>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <div style="width: 32px; height: 32px; background: #1976d2; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #e3f2fd; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #1565c0; border-radius: 4px;"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="teal" onclick="toggleSelect(this)">
    <div class="letter" style="background: #009688;">B</div>
    <div class="content">
      <h3>Teal</h3>
      <p>清新青色，现代感强，适合技术工具类扩展</p>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <div style="width: 32px; height: 32px; background: #009688; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #e0f2f1; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #00796b; border-radius: 4px;"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="indigo" onclick="toggleSelect(this)">
    <div class="letter" style="background: #3f51b5;">C</div>
    <div class="content">
      <h3>Indigo</h3>
      <p>深邃靛蓝，高级感，Material Design 官方推荐色</p>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <div style="width: 32px; height: 32px; background: #3f51b5; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #e8eaf6; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #303f9f; border-radius: 4px;"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="deep-purple" onclick="toggleSelect(this)">
    <div class="letter" style="background: #673ab7;">D</div>
    <div class="content">
      <h3>Deep Purple</h3>
      <p>优雅紫色，独特个性，适合创意类工具</p>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <div style="width: 32px; height: 32px; background: #673ab7; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #ede7f6; border-radius: 4px;"></div>
        <div style="width: 32px; height: 32px; background: #512da8; border-radius: 4px;"></div>
      </div>
    </div>
  </div>
</div>
